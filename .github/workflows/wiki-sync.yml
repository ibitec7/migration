name: Wiki

on:
  push:
    branches: [main, master]
    paths:
      - "wiki/**"
      - "scripts/wiki_common.py"
      - "scripts/sync_github_wiki.py"
      - "scripts/validate_wiki_export.py"
      - "scripts/validate_wiki_links.py"
      - ".github/workflows/wiki-sync.yml"
  pull_request:
    paths:
      - "wiki/**"
      - "scripts/wiki_common.py"
      - "scripts/sync_github_wiki.py"
      - "scripts/validate_wiki_export.py"
      - "scripts/validate_wiki_links.py"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Obsidian wikilinks
        run: |
          echo "🔍 Validating wiki links..."
          python3 scripts/validate_wiki_links.py
          echo "✅ Wiki link validation passed"

      - name: Export and validate GitHub Wiki links
        run: |
          echo "📤 Exporting and validating GitHub Wiki format..."
          python3 scripts/sync_github_wiki.py /tmp/github_wiki_export --validate
          echo "✅ GitHub Wiki validation passed"

      - name: Publish to GitHub Wiki
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
        env:
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
        run: |
          set -e
          
          if [ -z "${WIKI_PUSH_TOKEN:-}" ]; then
            echo "⚠️  WIKI_PUSH_TOKEN is not set; skipping wiki push."
            echo "📝 To enable wiki publishing, add a repository secret named 'WIKI_PUSH_TOKEN' with a GitHub Personal Access Token (PAT)"
            echo "   The PAT should have 'repo' and 'gist' scopes to push to the wiki repository."
            exit 0
          fi
          
          echo "📤 Publishing wiki to GitHub..."
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          REPO="${{ github.repository }}"
          WIKI_URL="https://x-access-token:${WIKI_PUSH_TOKEN}@github.com/${REPO}.wiki.git"
          
          git clone --depth=1 "${WIKI_URL}" /tmp/wikirepo 2>&1 | grep -v "Token\|token" || true
          
          cp -a /tmp/github_wiki_export/. /tmp/wikirepo/
          
          cd /tmp/wikirepo
          git add -A
          
          if git diff --staged --quiet; then
            echo "✅ No wiki changes to publish (wiki is up to date)"
          else
            echo "📝 Committing wiki changes..."
            git commit -m "Sync wiki from ${REPO}@${{ github.sha }}" \
                       -m "Updated from main repository" \
                       -m "Validation: all links verified" || true
            echo "🚀 Pushing to wiki repository..."
            git push origin HEAD
            echo "✅ Wiki published successfully"
          fi

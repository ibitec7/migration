name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        # Add this step BEFORE installing dependencies
        - name: Free Disk Space (Ubuntu)
          uses: jlumbroso/free-disk-space@main
          with:
            # This might remove tools that are pre-installed, but usually frees up ~30GB
            tool-cache: false
            android: true
            dotnet: true
            haskell: true
            large-packages: true
            docker-images: true
            swap-storage: true

        - name: Install dependencies
        
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync environment
        run: uv sync --locked
      - name: Dependency consistency check
        run: uv run python scripts/check_dependency_consistency.py
      - name: Compile Python sources
        run: uv run python -m compileall -q src
      - name: Lint (critical checks)
        run: uvx ruff check src scripts --select E9,F
      - name: CLI smoke tests
        run: |
          uv run python -m src.main --help
          uv run python -m src.collection.hf_sync --help
          uv run python -m src.analysis.event_visa_analysis --help
          uv run python -m src.analysis.trends_analysis --help
